name: IPTV Guncelleme Botu

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Depoyu Kopyala
      uses: actions/checkout@v4 # v3 yerine v4 yaptık (Warning çözüldü)

    - name: Python Kur
      uses: actions/setup-python@v5 # v4 yerine v5 yaptık (Warning çözüldü)
      with:
        python-version: '3.x'

    - name: Gerekli Kütüphaneleri Yukle
      run: pip install requests

    - name: Botu Calistir
      run: python bot.py

    - name: Degisiklikleri Github'a Kaydet
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add listem.m3u
        git commit -m "M3U Linki Guncellendi" || exit 0
        git push origin main # Hedef dalı netleştirdik (Hata çözüldü)
